<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0608;
    font-family: 'Cormorant Garamond', serif;
    color: #f5e6ea;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--d, 3s) ease-in-out infinite alternate; animation-delay: var(--delay, 0s); }
  @keyframes twinkle { from { opacity: 0.1; transform: scale(0.8); } to { opacity: 0.9; transform: scale(1.2); } }

  .petals-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
  .petal { position: absolute; top: -20px; animation: fall linear infinite; opacity: 0.6; }
  @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0.7; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 820px;
    padding: 40px 24px;
  }

  .tag-line {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c2858e;
    margin-bottom: 12px;
    animation: fadeUp 1s ease both;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 46px);
    font-style: italic;
    color: #f9dde2;
    margin-bottom: 6px;
    animation: fadeUp 1s ease 0.15s both;
    text-align: center;
  }

  .subtitle {
    font-size: 16px;
    font-style: italic;
    color: #9a606a;
    margin-bottom: 36px;
    animation: fadeUp 1s ease 0.25s both;
  }

  .video-frame {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(232,144,154,0.25);
    border-radius: 20px;
    overflow: hidden;
    animation: fadeUp 1s ease 0.4s both;
    position: relative;
  }

  .video-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border: 1px solid rgba(232,144,154,0.1);
    pointer-events: none;
    z-index: 1;
  }

  video {
    width: 100%;
    display: block;
    border-radius: 20px;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
    margin: 28px 0 20px;
    animation: fadeUp 1s ease 0.55s both;
    width: 100%;
    max-width: 400px;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #c2858e); }
  .divider-line.right { background: linear-gradient(to left, transparent, #c2858e); }

  .closing {
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 3vw, 22px);
    font-style: italic;
    color: #c2858e;
    text-align: center;
    animation: fadeUp 1s ease 0.65s both;
  }

  .hearts {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    font-size: 18px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  /* Mute button */
  #muteBtn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(232,144,154,0.15);
    border: 1px solid rgba(232,144,154,0.35);
    color: #f9dde2;
    font-size: 20px;
    cursor: pointer;
    z-index: 9999;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  #muteBtn:hover { background: rgba(232,144,154,0.28); transform: scale(1.08); }

  @media (max-width: 600px) {
    .container { padding: 28px 16px; }
    video { max-height: 55vh; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="petals-layer" id="petals"></div>

<div class="container">
  <p class="tag-line">A little something for you</p>
  <h1 class="title">For Sreyroth 🌸</h1>
  <p class="subtitle">Press play and just feel it, babe</p>

  <div class="video-frame">
    <video id="mainVideo" autoplay controls playsinline>
      <source src="videos/Who_know.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span>🌸</span>
    <div class="divider-line right"></div>
  </div>

  <p class="closing">"This song reminds me of you."</p>
  <div class="hearts"><span>🌷</span><span>💕</span><span>🌹</span></div>
</div>

<button id="muteBtn" aria-label="Toggle mute">🔊</button>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
    starsEl.appendChild(s);
  }

  const petalsEl = document.getElementById('petals');
  const petalChars = ['🌸','🌹','💗','✿','❀'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
    const dur = (Math.random() * 8 + 7).toFixed(1);
    p.style.cssText = `left:${Math.random()*100}%;animation-duration:${dur}s;animation-delay:${(Math.random()*10).toFixed(1)}s;font-size:${Math.random()*10+10}px;`;
    petalsEl.appendChild(p);
  }

  const video = document.getElementById('mainVideo');
  const muteBtn = document.getElementById('muteBtn');

  // Autoplay with sound fallback
  video.play().catch(() => {
    video.muted = true;
    video.play();
  });

  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? '🔇' : '🔊';
  });
</script>

</body>
</html>
